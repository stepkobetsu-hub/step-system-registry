function auth(){try{return JSON.parse(localStorage.getItem(AUTH_KEY)||'null')}catch(e){return null}}
async function api(action,extra){const a=auth();const res=await fetch(GAS,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(Object.assign({action,systemPortalSessionToken:a?.systemPortalSessionToken||''},extra||{})),redirect:'follow'});return res.json()}
async function init(){const a=auth();if(!a||!['2','3','4'].includes(String(a.permissionLevel))||!a.systemPortalSessionToken)return showLogin();try{await loadPortal()}catch(e){localStorage.removeItem(AUTH_KEY);showLogin(e.message||'セッションが切れました。再ログインしてください。')}}
async function loadPortal(){const out=await api('getSystemRegistry');if(!out.success)throw new Error(out.error||'台帳を取得できませんでした。');systems=organizeEntryImport(Array.isArray(out.systems)?out.systems:[]);fillFilters();document.getElementById('loginPanel').classList.add('hidden');document.getElementById('denied').classList.add('hidden');document.getElementById('portal').classList.remove('hidden');render()}
function showLogin(message){document.getElementById('portal').classList.add('hidden');document.getElementById('loginPanel').classList.remove('hidden');const error=document.getElementById('loginError');error.textContent=message||'';error.classList.toggle('hidden',!message);document.getElementById('loginCode').value=auth()?.code||localStorage.getItem('stepStaffAppCode')||'';document.getElementById('loginCode').focus()}
async function login(event){event.preventDefault();const code=document.getElementById('loginCode').value.trim();const password=document.getElementById('loginPassword').value;const button=document.getElementById('loginBtn');button.disabled=true;try{const out=await api('staffLogin',{code,password});if(!out.success)throw new Error(out.error||'ログインできませんでした。');if(!['2','3','4'].includes(String(out.permissionLevel))||!out.systemPortalSessionToken)throw new Error('STEP総合管理ポータルを利用する権限がありません。');localStorage.setItem('stepStaffAppCode',code);localStorage.setItem(AUTH_KEY,JSON.stringify({code,name:out.name||'',permissionLevel:out.permissionLevel,systemPortalSessionToken:out.systemPortalSessionToken,systemPortalExpiresAt:out.systemPortalExpiresAt||'',savedAt:new Date().toISOString()}));document.getElementById('loginPassword').value='';await loadPortal()}catch(e){localStorage.removeItem(AUTH_KEY);showLogin(e.message||'ログインできませんでした。')}finally{button.disabled=false}}
function deny(message){document.getElementById('portal').classList.add('hidden');const el=document.getElementById('denied');el.textContent=message;el.classList.remove('hidden')}
async function logout(){try{await api('logoutSystemPortal')}catch(e){}localStorage.removeItem(AUTH_KEY);document.getElementById('loginPassword').value='';showLogin('ログアウトしました。')}
function fillFilters(){fill('category',unique(systems.map(x=>x['分類'])));fill('status',unique(systems.map(effectiveStatus)))}
function fill(id,values){const s=document.getElementById(id);values.forEach(v=>{if(!v)return;const o=document.createElement('option');o.value=v;o.textContent=v;s.appendChild(o)})}
function unique(a){return [...new Set(a.filter(Boolean))].sort((x,y)=>x.localeCompare(y,'ja'))}
function effectiveStatus(item){return isTeacherSchedule(item)?'本番':item['状態']}
function normalizeSearch(value){return String(value??'').toLowerCase().normalize('NFKC').replace(/[\s　]+/g,'')}
function searchableText(item){return normalizeSearch(Object.entries(applyAssetInfo(applyConfirmedInfo(item))).flatMap(([key,value])=>[key,Array.isArray(value)?value.join(' '):value]).join(' '))}
function render(){const q=normalizeSearch(document.getElementById('search').value);const c=document.getElementById('category').value;const st=document.getElementById('status').value;const investigation=document.getElementById('investigationFilter').value;const list=systems.filter(x=>(!c||x['分類']===c)&&(!st||effectiveStatus(x)===st)&&(!q||searchableText(x).includes(q))&&matchesInvestigationFilter(x,investigation));const root=document.getElementById('cards');root.replaceChildren(...list.map(card));document.getElementById('count').textContent=`${list.length}件表示`;const researchCount=list.reduce((sum,item)=>sum+investigationItems(applyAssetInfo(applyConfirmedInfo(item))).filter(x=>x.level==='important'||x.level==='required').length,0);document.getElementById('investigationCount').textContent=`要調査：${researchCount}件`}
function isQrRegister(item){return item['ID']==='qr-register'||item['システム名']==='出退くんQR作成・読取'}
function isJukuCard(item){return item['ID']==='juku-card'||item['システム名']==='受付カード読み取り'}

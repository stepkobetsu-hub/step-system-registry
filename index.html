<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>STEPシステム資産管理台帳</title>
<link rel="icon" href="images/system-portal/favicon.png"><link rel="apple-touch-icon" href="images/system-portal/apple-touch-icon.png">
<style>
:root{--navy:#102a43;--blue:#2563eb;--line:#d8e2ec;--bg:#f4f7fb;--muted:#627d98;--red:#b42318}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#152536;font-family:Meiryo,'Noto Sans JP',sans-serif}.shell{width:min(1180px,calc(100% - 28px));margin:auto;padding:24px 0 48px}header{display:flex;justify-content:space-between;gap:18px;align-items:flex-start}.brand{display:flex;gap:13px;align-items:center}.brand img{width:58px;height:58px;border-radius:14px}h1{margin:0;color:var(--navy);font-size:clamp(24px,4vw,36px)}.lead{color:var(--muted);margin:6px 0}.former{display:inline-block;background:#e6edf5;color:#486581;border-radius:999px;padding:3px 8px;font-size:12px;font-weight:bold}.actions{display:flex;gap:8px}.btn,.open{border:0;border-radius:9px;padding:10px 12px;font-weight:bold;text-decoration:none;cursor:pointer}.btn{background:#e6edf5;color:var(--navy)}.open{background:var(--blue);color:#fff}.hidden{display:none!important}.login{width:min(430px,100%);margin:48px auto;background:#fff;border:1px solid var(--line);border-radius:16px;padding:24px}.login label{display:block;font-weight:bold;margin:14px 0 5px}.login input{width:100%;padding:11px;border:1px solid #bcccdc;border-radius:9px}.login .open{width:100%;margin-top:18px}.error{color:var(--red);font-weight:bold}.toolbar{display:grid;grid-template-columns:1fr 200px 200px auto;gap:9px;margin:20px 0}.toolbar input,.toolbar select{width:100%;padding:10px;border:1px solid #bcccdc;border-radius:9px;background:#fff}.count{color:var(--muted);font-weight:bold}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;min-width:0}.card h2{font-size:18px;color:var(--navy);margin:0 0 6px}.meta{color:var(--muted);font-size:12px}.status{display:inline-block;background:#e7f8ef;color:#147d4d;border-radius:999px;padding:3px 8px;font-weight:bold;font-size:12px}.links{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}.links a{font-size:12px}.detail{margin-top:12px;border-top:1px solid #edf2f7;padding-top:10px;white-space:pre-wrap;font-size:12px;color:#486581;overflow-wrap:anywhere}@media(max-width:780px){header{display:block}.actions{margin-top:12px}.toolbar{grid-template-columns:1fr 1fr}.toolbar input{grid-column:1/-1}.grid{grid-template-columns:1fr}.brand{align-items:flex-start}.brand img{width:48px;height:48px}.shell{width:calc(100% - 20px);padding-top:14px}}
</style></head>
<body><main class="shell"><header><div class="brand"><img src="images/system-portal/app-icon-192.png" alt=""><div><h1>STEPシステム資産管理台帳</h1><p class="lead">本番・旧版・GitHub・Apps Script・保存先の横断管理</p><span class="former">旧称：STEP総合管理ポータル</span></div></div><div class="actions"><a class="btn" href="https://stepkobetsu-hub.github.io/seiseki-kanri/">スタッフ用アプリへ戻る</a><button class="btn" id="logout">ログアウト</button></div></header>
<section id="login" class="login hidden"><h2>ログイン</h2><p>講師番号とパスワードを入力してください。権限2・3・4のスタッフが利用できます。</p><form id="loginForm"><label for="code">講師番号</label><input id="code" autocomplete="username" required><label for="password">パスワード</label><input id="password" type="password" autocomplete="current-password"><button class="open" type="submit">ログイン</button><p id="error" class="error"></p></form></section>
<section id="portal" class="hidden"><div class="toolbar"><input id="search" type="search" placeholder="システムを検索"><select id="category"><option value="">すべての分類</option></select><select id="status"><option value="">すべての状態</option></select><button class="btn" id="clear">検索をクリア</button></div><p id="count" class="count"></p><div id="cards" class="grid"></div></section></main>
<script>
const GAS='https://script.google.com/macros/s/AKfycbypkUc0MqZ07E7pZRglNPeRM56WbCcuWaLpRzi9bVFcPklHDxaaLC7GfzG6ozTGCbEX/exec',AUTH_KEY='stepStaffAppAuth';
const URL_FIELDS=['利用者向けURL','管理者向けURL','読み取りURL','入力フォームURL','Google Sheet URL','GitHub URL','Apps Script編集URL','Apps Script WebアプリURL','GitHub Pages URL','Supabase URL'];let systems=[];
const $=id=>document.getElementById(id),auth=()=>{try{return JSON.parse(localStorage.getItem(AUTH_KEY)||'null')}catch(e){return null}};
async function api(action,extra){const a=auth(),r=await fetch(GAS,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(Object.assign({action,systemPortalSessionToken:a&&a.systemPortalSessionToken||''},extra||{}))});return r.json()}
function showLogin(message){$('portal').classList.add('hidden');$('login').classList.remove('hidden');$('error').textContent=message||'';$('code').value=(auth()&&auth().code)||localStorage.getItem('stepStaffAppCode')||''}
async function load(){const out=await api('getSystemRegistry');if(!out.success)throw Error(out.error||'台帳を取得できませんでした。');systems=Array.isArray(out.systems)?out.systems:[];fill('category',[...new Set(systems.map(x=>x['分類']).filter(Boolean))]);fill('status',[...new Set(systems.map(x=>x['状態']).filter(Boolean))]);$('login').classList.add('hidden');$('portal').classList.remove('hidden');render()}
async function init(){const a=auth();if(!a||!['2','3','4'].includes(String(a.permissionLevel))||!a.systemPortalSessionToken)return showLogin();try{await load()}catch(e){localStorage.removeItem(AUTH_KEY);showLogin(e.message)}}
function fill(id,values){values.sort((a,b)=>a.localeCompare(b,'ja')).forEach(v=>{const o=document.createElement('option');o.value=o.textContent=v;$(id).append(o)})}
function text(v){return String(v==null?'':v)}function esc(v){return text(v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function render(){const q=$('search').value.toLowerCase().replace(/\s/g,''),cat=$('category').value,st=$('status').value;const list=systems.filter(x=>(!cat||x['分類']===cat)&&(!st||x['状態']===st)&&(!q||JSON.stringify(x).toLowerCase().replace(/\s/g,'').includes(q)));$('count').textContent=list.length+'件を表示';$('cards').innerHTML=list.map(card).join('')}
function card(x){const links=URL_FIELDS.filter(k=>/^https?:/.test(text(x[k]))).map(k=>'<a class="open" target="_blank" rel="noopener" href="'+esc(x[k])+'">'+esc(k.replace('URL','').trim()||'開く')+'</a>').join('');const details=['正本ファイル','最新版の場所','保存基盤','Google Sheet名','使用シート名','Apps Script種別','確認状況','未確認項目'].filter(k=>x[k]).map(k=>k+'：'+(Array.isArray(x[k])?x[k].join('、'):x[k])).join('\n');return '<article class="card"><span class="status">'+esc(x['状態']||'要確認')+'</span><h2>'+esc(x['システム名']||'名称未設定')+'</h2><div class="meta">'+esc([x['分類'],x['利用者']].filter(Boolean).join(' / '))+'</div><p>'+esc(x['概要']||'')+'</p><div class="links">'+links+'</div>'+(details?'<div class="detail">'+esc(details)+'</div>':'')+'</article>'}
$('loginForm').addEventListener('submit',async e=>{e.preventDefault();try{const code=$('code').value.trim(),out=await api('staffLogin',{code,password:$('password').value});if(!out.success||!['2','3','4'].includes(String(out.permissionLevel))||!out.systemPortalSessionToken)throw Error(out.error||'利用権限がありません。');localStorage.setItem('stepStaffAppCode',code);localStorage.setItem(AUTH_KEY,JSON.stringify({code,name:out.name||'',permissionLevel:out.permissionLevel,systemPortalSessionToken:out.systemPortalSessionToken,systemPortalExpiresAt:out.systemPortalExpiresAt||''}));$('password').value='';await load()}catch(err){localStorage.removeItem(AUTH_KEY);showLogin(err.message)}});
$('logout').addEventListener('click',async()=>{try{await api('logoutSystemPortal')}catch(e){}localStorage.removeItem(AUTH_KEY);showLogin('ログアウトしました。')});['search','category','status'].forEach(id=>$(id).addEventListener(id==='search'?'input':'change',render));$('clear').addEventListener('click',()=>{$('search').value=$('category').value=$('status').value='';render()});init();
</script></body></html>
